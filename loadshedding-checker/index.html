<h2>🇿🇦 Mid-Ennerdale Schedule</h2>
<button onclick="getSchedule()">Check My Times Today</button>
<div id="result" style="margin-top:15px; font-size:16px;"></div>

<script>
  const TOKEN = "650F94AC-DFE94DBB-9783CDC1-DD518226";
async function getSchedule() {
  document.getElementById("result").innerHTML = "Finding Mid-Ennerdale... ⏳";
  try {
    const searchRes = await fetch("https://developer.sepush.co.za/business/2.0/areas_search?text=Mid-Ennerdale", {
      headers: { "token": TOKEN }
    });
    const searchData = await searchRes.json();
    if (!searchData.areas.length) {
      document.getElementById("result").innerHTML = "❌ Couldn't find Mid-Ennerdale";
      return;
    }
    const areaId = searchData.areas[0].id;
    const schedRes = await fetch(`https://developer.sepush.co.za/business/2.0/area?id=${areaId}`, {
      headers: { "token": TOKEN }
    });
    const schedData = await schedRes.json();
    const today = schedData.schedule.days[0];
    const times = today.stages[1];
    if (!times || times.length === 0) {
      document.getElementById("result").innerHTML = "✅ No loadshedding scheduled for you today";
    } else {
      document.getElementById("result").innerHTML = `⚠️ Loadshedding today: ${times.join(", ")}`;
    }
  } catch (e) {
    document.getElementById("result").innerHTML = "❌ Network hiccup. Code is correct. Try on WiFi.";
  }
}
</script>

<style>
  body { font-family: Arial; padding: 20px; background: #f5f5f5; }
  button { background: #e53935; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; }
  #result { padding: 15px; background: white; border-radius: 6px; margin-top: 15px; }
</style>
